<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi aidants naturels</title>
<!-- MSAL chargé en premier, de façon synchrone -->
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:#1a1a1a;background:#f3f2f1;min-height:100vh}
.app{display:flex;flex-direction:column;height:100vh;background:#fff}
.topbar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #e1dfdd;background:#fff;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:600;flex:1;color:#323130}
.btn{padding:5px 12px;border:1px solid #c8c6c4;border-radius:4px;background:#fff;color:#323130;cursor:pointer;font-size:12px;display:inline-flex;align-items:center;gap:5px;font-family:inherit}
.btn:hover{background:#f3f2f1}
.btn-primary{background:#0078d4;color:#fff;border-color:#0078d4}
.btn-primary:hover{background:#106ebe}
.btn-sm{padding:3px 9px;font-size:11px}
.user-info{font-size:12px;color:#605e5c}
.main{display:flex;flex:1;min-height:0}
.sidebar{width:200px;border-right:1px solid #e1dfdd;padding:10px;display:flex;flex-direction:column;gap:5px;background:#faf9f8;overflow-y:auto;flex-shrink:0}
.sidebar-label{font-size:10px;font-weight:600;color:#605e5c;text-transform:uppercase;letter-spacing:.05em;padding:4px 2px 2px}
.client-item{padding:7px 8px;border-radius:4px;cursor:pointer;display:flex;align-items:center;gap:8px}
.client-item:hover{background:#edebe9}
.client-item.active{background:#e1f0ff;border:1px solid #b3d6f5}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;color:#fff}
.client-name{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#323130}
.client-sub{font-size:10px;color:#605e5c}
.content{flex:1;overflow:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.tabs{display:flex;gap:0;border-bottom:1px solid #e1dfdd;margin-bottom:4px}
.tab{padding:8px 14px;cursor:pointer;font-size:12px;color:#605e5c;border:none;background:transparent;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab:hover{color:#323130;background:#f3f2f1}
.tab.active{color:#0078d4;border-bottom-color:#0078d4;font-weight:600}
.cal-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cal-nav{background:#fff;border:1px solid #c8c6c4;border-radius:4px;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#323130}
.cal-nav:hover{background:#f3f2f1}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dn{text-align:center;font-size:10px;color:#605e5c;padding:4px 0;font-weight:600}
.cal-day{min-height:54px;border-radius:4px;border:1px solid #e1dfdd;padding:3px 5px;cursor:pointer;background:#fff}
.cal-day:hover{border-color:#c8c6c4;background:#faf9f8}
.cal-day.other-month{opacity:.35}
.cal-day.today{border-color:#0078d4}
.cal-day.today .dn{background:#0078d4;color:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center}
.dn{font-size:10px;font-weight:500;margin-bottom:2px;width:18px;height:18px;display:flex;align-items:center;justify-content:center}
.cal-evt{font-size:9px;padding:2px 4px;border-radius:3px;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer}
.card{border:1px solid #e1dfdd;border-radius:4px;padding:12px 14px;background:#fff}
.card-title{font-size:11px;font-weight:600;color:#605e5c;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.field{display:flex;flex-direction:column;gap:2px}
.field label{font-size:10px;color:#605e5c}
.field span{font-size:12px;font-weight:500;color:#323130}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600}
.badge-pa{background:#dff6dd;color:#107c10}
.badge-non{background:#f3f2f1;color:#605e5c;border:1px solid #c8c6c4}
.note-card{border:1px solid #e1dfdd;border-radius:4px;padding:10px 12px;background:#fff;cursor:pointer}
.note-card:hover{border-color:#c8c6c4;background:#faf9f8}
.note-meta{display:flex;align-items:center;gap:7px;margin-bottom:5px;flex-wrap:wrap}
.note-preview{font-size:11px;color:#605e5c;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat-card{background:#faf9f8;border:1px solid #e1dfdd;border-radius:4px;padding:12px}
.stat-label{font-size:10px;color:#605e5c}
.stat-val{font-size:22px;font-weight:600;margin-top:2px;color:#323130}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{text-align:left;padding:6px 8px;font-size:10px;font-weight:600;color:#605e5c;border-bottom:1px solid #e1dfdd;background:#faf9f8}
.tbl td{padding:6px 8px;border-bottom:1px solid #e1dfdd;color:#323130}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#faf9f8}
.modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-start;justify-content:center;padding:20px;z-index:1000;overflow:auto}
.modal{background:#fff;border-radius:4px;border:1px solid #c8c6c4;box-shadow:0 8px 32px rgba(0,0,0,.18);width:100%;max-width:640px;padding:20px;display:flex;flex-direction:column;gap:12px}
.modal-hdr{display:flex;align-items:center;gap:8px;border-bottom:1px solid #e1dfdd;padding-bottom:12px}
.modal-title{font-size:16px;font-weight:600;flex:1;color:#323130}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:11px;color:#605e5c;font-weight:500}
.fg input,.fg select,.fg textarea{width:100%;padding:6px 9px;border:1px solid #c8c6c4;border-radius:2px;background:#fff;color:#323130;font-family:inherit;font-size:12px;resize:vertical}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#0078d4}
.fg textarea{line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.sec{font-size:10px;font-weight:600;color:#605e5c;text-transform:uppercase;letter-spacing:.06em;padding:4px 0 2px;border-top:1px solid #e1dfdd;margin-top:4px}
.modal-foot{display:flex;justify-content:flex-end;gap:7px;padding-top:8px;border-top:1px solid #e1dfdd;margin-top:4px}
.empty{color:#605e5c;font-size:12px;text-align:center;padding:32px 0}
.hint{font-size:10px;color:#605e5c;font-style:italic;line-height:1.6;padding:6px 10px;background:#faf9f8;border-radius:2px;border-left:3px solid #c8c6c4;margin-bottom:2px}
.note-section{display:flex;flex-direction:column;gap:3px;margin-bottom:4px}
.section-header{padding:6px 10px;border-radius:2px;margin-bottom:2px}
.section-label{font-size:11px;font-weight:600;margin-bottom:4px}
.s-contexte{background:#edf7ed;border-left:3px solid #107c10}.s-contexte .section-label{color:#107c10}
.s-ooe{background:#e8f4fd;border-left:3px solid #0078d4}.s-ooe .section-label{color:#0078d4}
.s-objectif{background:#fff8e1;border-left:3px solid #f7a800}.s-objectif .section-label{color:#8a5f00}
.s-aos{background:#e3f4f4;border-left:3px solid #00b7c3}.s-aos .section-label{color:#005f64}
.s-hypnose{background:#f0eeff;border-left:3px solid #7160e8}.s-hypnose .section-label{color:#4a3a9a}
.s-suite{background:#fff0e8;border-left:3px solid #e06c00}.s-suite .section-label{color:#a14800}
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:20px;background:#f3f2f1}
.login-card{background:#fff;border:1px solid #e1dfdd;border-radius:4px;padding:40px;text-align:center;max-width:400px;width:100%}
.login-title{font-size:20px;font-weight:600;color:#323130;margin-bottom:8px}
.login-sub{font-size:13px;color:#605e5c;margin-bottom:24px;line-height:1.5}
.sp-err{color:#a4262c;font-size:11px;padding:4px 8px;background:#fde7e9;border-radius:2px;margin-top:8px}
.outlook-pill{display:inline-flex;align-items:center;gap:4px;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600;background:#dff6dd;color:#107c10}
</style>
</head>
<body>

<div id="login-screen" class="login-screen">
  <div class="login-card">
    <div style="font-size:40px;margin-bottom:12px">🤝</div>
    <div class="login-title">Suivi aidants naturels</div>
    <div class="login-sub">ABBS — Proches aidants<br>Connectez-vous avec votre compte Microsoft 365 pour accéder à l'application.</div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:10px;font-size:13px" onclick="signIn()">
      <svg width="16" height="16" viewBox="0 0 23 23" fill="none" style="flex-shrink:0"><rect x="1" y="1" width="10" height="10" fill="#f25022"/><rect x="12" y="1" width="10" height="10" fill="#7fba00"/><rect x="1" y="12" width="10" height="10" fill="#00a4ef"/><rect x="12" y="12" width="10" height="10" fill="#ffb900"/></svg>
      Se connecter avec Microsoft
    </button>
    <div id="login-err"></div>
  </div>
</div>

<div id="main-app" class="app" style="display:none">
  <div class="topbar">
    <span style="font-size:20px">🤝</span>
    <span class="topbar-title">Suivi aidants naturels — ABBS</span>
    <div id="outlook-status" class="outlook-pill" style="display:none">📅 Outlook connecté</div>
    <div class="user-info" id="user-info"></div>
    <button class="btn btn-sm" onclick="loadOutlookEvents()" id="btn-sync" style="display:none">⟳ Outlook</button>
    <button class="btn btn-sm btn-primary" onclick="openNewNote()">+ Nouvelle note</button>
    <button class="btn btn-sm" onclick="signOut()">Déconnexion</button>
  </div>
  <div class="main">
    <div class="sidebar">
      <div class="sidebar-label">Aidants</div>
      <div id="client-list"></div>
      <button class="btn btn-sm" style="margin-top:6px;width:100%;justify-content:center" onclick="openAddClient()">+ Ajouter</button>
      <div style="margin-top:8px;border-top:1px solid #e1dfdd;padding-top:8px">
        <div class="sidebar-label">Données</div>
        <button class="btn btn-sm" style="width:100%;justify-content:center;margin-top:4px" onclick="loadSPList()">⟳ Actualiser liste</button>
        <div id="sp-status"></div>
      </div>
    </div>
    <div class="content">
      <div class="tabs">
        <button class="tab active" id="tab-cal" onclick="showTab('cal')">📅 Calendrier</button>
        <button class="tab" id="tab-hist" onclick="showTab('hist')">📋 Historique</button>
        <button class="tab" id="tab-fiche" onclick="showTab('fiche')">👤 Fiche</button>
        <button class="tab" id="tab-stats" onclick="showTab('stats')">📊 Tableau de bord</button>
      </div>
      <div id="view-cal"></div>
      <div id="view-hist" style="display:none"></div>
      <div id="view-fiche" style="display:none"></div>
      <div id="view-stats" style="display:none"></div>
    </div>
  </div>
</div>
<div id="mc"></div>

<script>
// ═══════════════════════════════════════════
// CONFIGURATION
// ═══════════════════════════════════════════
var CLIENT_ID = 'c0d53050-011c-4ecc-a023-820b6d449290';
var TENANT_ID = '7176cff7-e636-4619-ba33-cd9526743ef8';
var SP_SITE   = 'https://benevolatbeauce.sharepoint.com/sites/ABBS-Proches-aidants';
var SP_LIST   = 'ListePA';

// ═══════════════════════════════════════════
// CONSTANTES
// ═══════════════════════════════════════════
var MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
var DAYS=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
var COLORS=['#0078d4','#107c10','#8764b8','#d83b01','#00b7c3','#b146c2','#038387','#e81123'];
var HINTS={
  contexte:'Situation de vie, santé, entourage, médication.\nApproche(s) utilisée(s) cette fois.',
  ooe:'Fil conducteur, métaphore ou image à reprendre.\nCe qui restait en suspens la dernière fois.\nCe qu\'il·elle a amené de lui·elle-même.',
  objectif:'Trajectoire (pars de… aboutit à) dans ses mots.\nComment il·elle saura que c\'est atteint.\nSon idée / suggéré / co-construit?\nSignes concrets? Obstacles? Ce qu\'il·elle a déjà essayé?',
  aos:'Ressources identifiées. Question de prise de conscience.\nPrise de conscience principale.\nExceptions? Questions échelle? Ce qui serait différent si c\'était résolu?',
  hypnose:'Induction / porte d\'entrée.\nCe qui a émergé (réactions, émotions, images).\nSuggestions utilisées. Outil : machine à phrases / métaphore / ancrage / autre.\nSortie : spontanée / guidée. Réaction et discours ensuite.\nSes propres mots? Suggestion post-hypnotique? Ancrage à reprendre?',
  suite:'Ce avec quoi la personne repart / engagements.\nCe que je n\'ai pas fait cette fois (à garder en tête).\nMon intuition / impression générale.'
};

// ═══════════════════════════════════════════
// DONNÉES LOCALES
// ═══════════════════════════════════════════
var S={clients:[],notes:[],selectedClient:null,calYear:new Date().getFullYear(),calMonth:new Date().getMonth(),activeTab:'cal',nextId:1,nextClientId:1};
function save(){try{localStorage.setItem('pa_abbs',JSON.stringify({notes:S.notes,nextId:S.nextId,nextClientId:S.nextClientId}))}catch(e){}}
function load(){try{var d=localStorage.getItem('pa_abbs');if(d){var p=JSON.parse(d);S.notes=p.notes||[];S.nextId=p.nextId||1;S.nextClientId=p.nextClientId||1}}catch(e){}}
load();

// ═══════════════════════════════════════════
// MSAL
// ═══════════════════════════════════════════
var msalConfig = {
  auth: {
    clientId: CLIENT_ID,
    authority: 'https://login.microsoftonline.com/' + TENANT_ID,
    redirectUri: window.location.origin + window.location.pathname
  },
  cache: { cacheLocation: 'sessionStorage' }
};
var msalInstance = null;
window.addEventListener('DOMContentLoaded', function() {
  msalInstance = new msal.PublicClientApplication(msalConfig);
  msalInstance.handleRedirectPromise().then(function(resp) {
    if (resp && resp.account) {
      currentAccount = resp.account;
      afterLogin();
    } else {
      var accounts = msalInstance.getAllAccounts();
      if (accounts.length > 0) { currentAccount = accounts[0]; afterLogin(); }
    }
  }).catch(function(e){
    document.getElementById('login-err').innerHTML = '<div class="sp-err">Erreur retour: '+e.message+'</div>';
  });
});

var currentAccount = null;
var outlookEvents = [];

msalInstance.handleRedirectPromise().then(function() {
  var accounts = msalInstance.getAllAccounts();
  if (accounts.length > 0) { currentAccount = accounts[0]; afterLogin(); }
}).catch(function(e){ console.error(e); });

async function getToken(scopes) {
  try {
    await msalInstance.acquireTokenRedirect({scopes:scopes, account:currentAccount});
    return r.accessToken;
  } catch(e) {
    var r = await msalInstance.acquireTokenPopup({scopes:scopes, account:currentAccount});
    return r.accessToken;
  }
}

async function signIn() {
  if (!msalInstance) { document.getElementById('login-err').innerHTML='<div class="sp-err">Patientez et réessayez.</div>'; return; }
  try {
    await msalInstance.loginRedirect({scopes:['User.Read']});
  } catch(e) {
    document.getElementById('login-err').innerHTML = '<div class="sp-err">Erreur de connexion : '+e.message+'</div>';
  }
}

function signOut() {
  msalInstance.logoutPopup();
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('main-app').style.display='none';
}

async function afterLogin() {
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-app').style.display='flex';
  document.getElementById('user-info').textContent = currentAccount.name || currentAccount.username;
  document.getElementById('btn-sync').style.display='';
  await loadSPList();
  await loadOutlookEvents();
  render();
}

// ═══════════════════════════════════════════
// SHAREPOINT
// ═══════════════════════════════════════════
async function loadSPList() {
  var el = document.getElementById('sp-status');
  el.innerHTML = '<div style="font-size:10px;color:#605e5c;padding:4px 0">⟳ Chargement...</div>';
  try {
   var token = await getToken(['https://graph.microsoft.com/.default']);
    var url = 'https://graph.microsoft.com/v1.0/sites/benevolatbeauce.sharepoint.com:/sites/ABBS-Proches-aidants:/lists/'+SP_LIST+'/items?$expand=fields&$top=500';
    var resp = await fetch(url, {headers:{Authorization:'Bearer '+token, Accept:'application/json;odata=nometadata'}});
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var data = await resp.json();
    mergeSPClients(data.value);
    el.innerHTML = '<div style="font-size:10px;color:#107c10;padding:4px 0">✓ '+data.value.length+' aidants</div>';
  } catch(e) {
    el.innerHTML = '<div class="sp-err">Erreur SP: '+e.message+'</div>';
  }
}

function mergeSPClients(items) {
  items.forEach(function(item) {
    var nom = item['Nom_x002b_Pr_x00e9_nom'] || item.Title || '';
    var existing = S.clients.find(function(c){return c.spId===item.Id});
    var client = {
      id: existing ? existing.id : S.nextClientId++,
      spId: item.Id, nom: nom,
      tel: item['T_x00e9_l_x00e9_phone'] || '',
      sexe: item.Sexe || '',
      age: item['_x00c2_ge'] || '',
      anniversaire: item.Anniversaire ? item.Anniversaire.slice(0,10) : '',
      adresse: item.Adresse || '',
      municipalite: item['Municipalit_x00e9_'] || '',
      membrePA: !!(item['Membres_x0020_PA']),
      periode: item.Title || '',
      jasette: parseFloat(item.Jasette)||0,
      formationPA: parseFloat(item['Formation_x0020_PA'])||0,
      zen: parseFloat(item.Zen)||0,
      heuresGroupes: parseFloat(item['Heures_x0020_re_x00e7_ues_x0020_groupes'])||0,
      lienAide: item['Lien_x0020_avec_x0020_la_x0020_personne_x0020_aid_x00e9_e'] || '',
      nomAide: item['Nom_x0020_Personne_x0020_Aid_x00e9_e'] || '',
      sexeAide: item['Sexe_x0020_de_x0020_l_x0027_Aid_x00e9_'] || '',
      ageAide: item['_x00c2_ge_x0020_de_x0020_la_x0020_personne_x0020_aid_x00e9_e'] || '',
      probleme: item['Probl_x00e8_me_x0020__x0028_maladie_x0020_etc_x0029_'] || '',
      seulAide: !!(item['Vie_x0020_seule_x003f_']),
      lieuVie: item['Lieu_x0020_de_x0020_Vie'] || '',
      moisRencontre: item['Mois_x0020_de_x0020_rencontre'] || '',
    };
    if (existing) Object.assign(existing, client);
    else S.clients.push(client);
  });
  save(); render();
}

// ═══════════════════════════════════════════
// OUTLOOK
// ═══════════════════════════════════════════
async function loadOutlookEvents() {
  try {
    var token = await getToken(['https://graph.microsoft.com/Calendars.Read','https://graph.microsoft.com/User.Read']);
    var now = new Date();
    var start = new Date(now.getFullYear(), now.getMonth()-1, 1).toISOString();
    var end   = new Date(now.getFullYear(), now.getMonth()+3, 0).toISOString();
    var url = 'https://graph.microsoft.com/v1.0/me/calendarView?startDateTime='+start+'&endDateTime='+end+'&$select=subject,start,end&$top=200';
    var resp = await fetch(url, {headers:{Authorization:'Bearer '+token, Prefer:'outlook.timezone="America/Toronto"'}});
    if (!resp.ok) throw new Error('HTTP '+resp.status);
    var data = await resp.json();
    outlookEvents = data.value || [];
    document.getElementById('outlook-status').style.display='';
    renderView();
  } catch(e) { console.warn('Outlook:', e.message); }
}

function getOutlookForDate(ds) {
  return outlookEvents.filter(function(e){return e.start&&e.start.dateTime&&e.start.dateTime.slice(0,10)===ds});
}

// ═══════════════════════════════════════════
// RENDU
// ═══════════════════════════════════════════
function clientColor(id){return COLORS[(id-1)%COLORS.length]}
function initials(n){return(n||'?').split(/[\s,]+/).filter(Boolean).map(function(w){return w[0]}).join('').slice(0,2).toUpperCase()}
function render(){renderClients();renderView()}

function renderClients(){
  var el=document.getElementById('client-list');if(!el)return;
  if(!S.clients.length){el.innerHTML='<div style="font-size:11px;color:#605e5c;padding:4px">Actualisez la liste SharePoint.</div>';return}
  el.innerHTML=S.clients.map(function(c){
    var nb=S.notes.filter(function(n){return n.clientId===c.id}).length;
    var col=clientColor(c.id);
    return'<div class="client-item'+(S.selectedClient===c.id?' active':'')+'" onclick="selClient('+c.id+')">'+
      '<div class="av" style="background:'+col+'">'+initials(c.nom)+'</div>'+
      '<div style="flex:1;min-width:0"><div class="client-name">'+c.nom+'</div>'+
      '<div class="client-sub">'+(c.membrePA?'PA':'Non-PA')+' · '+nb+' note'+(nb!==1?'s':'')+'</div></div></div>';
  }).join('');
}

function selClient(id){S.selectedClient=S.selectedClient===id?null:id;render()}

function showTab(t){
  S.activeTab=t;
  ['cal','hist','fiche','stats'].forEach(function(x){
    document.getElementById('tab-'+x).classList.toggle('active',x===t);
    document.getElementById('view-'+x).style.display=x===t?'':'none';
  });
  renderView();
}

function renderView(){
  if(S.activeTab==='cal')renderCal();
  else if(S.activeTab==='hist')renderHist();
  else if(S.activeTab==='fiche')renderFiche();
  else renderStats();
}

function renderCal(){
  var el=document.getElementById('view-cal');if(!el)return;
  var y=S.calYear,m=S.calMonth;
  var first=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate();
  var today=new Date();
  var notes=S.selectedClient?S.notes.filter(function(n){return n.clientId===S.selectedClient}):S.notes;
  var byDate={};
  notes.forEach(function(n){if(!byDate[n.date])byDate[n.date]=[];byDate[n.date].push(n)});
  var h='<div class="cal-header">'+
    '<button class="cal-nav" onclick="calNav(-1)">&#8249;</button>'+
    '<span style="font-size:14px;font-weight:600;flex:1;color:#323130">'+MONTHS[m]+' '+y+'</span>'+
    '<button class="cal-nav" onclick="calNav(1)">&#8250;</button>'+
    '</div><div class="cal-grid">';
  DAYS.forEach(function(d){h+='<div class="cal-dn">'+d+'</div>'});
  var prev=new Date(y,m,0).getDate();
  for(var i=0;i<first;i++){h+='<div class="cal-day other-month"><div class="dn">'+(prev-first+i+1)+'</div></div>'}
  for(var d=1;d<=dim;d++){
    var ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var isT=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
    var evts='';
    (byDate[ds]||[]).forEach(function(n){
      var c=S.clients.find(function(cl){return cl.id===n.clientId});
      var col=c?clientColor(c.id):'#888';
      evts+='<div class="cal-evt" style="background:'+col+'20;color:'+col+';border-left:2px solid '+col+'" onclick="openNote('+n.id+');event.stopPropagation()">'+(c?c.nom.split(',')[0]:'?')+'</div>';
    });
    getOutlookForDate(ds).forEach(function(e){
      var time=e.start.dateTime?e.start.dateTime.slice(11,16):'';
      evts+='<div class="cal-evt" style="background:#fff4e5;color:#8a5f00;border-left:2px solid #f7a800" title="'+e.subject+'">'+time+' '+(e.subject||'').slice(0,14)+'</div>';
    });
    h+='<div class="cal-day'+(isT?' today':'')+'" onclick="openNewNoteDate(\''+ds+'\')"><div class="dn">'+d+'</div>'+evts+'</div>';
  }
  var rem=(7-(first+dim)%7)%7;
  for(var i=1;i<=rem;i++)h+='<div class="cal-day other-month"><div class="dn">'+i+'</div></div>';
  el.innerHTML=h+'</div>';
}

function calNav(d){S.calMonth+=d;if(S.calMonth>11){S.calMonth=0;S.calYear++}if(S.calMonth<0){S.calMonth=11;S.calYear--}renderCal()}

function renderHist(){
  var el=document.getElementById('view-hist');if(!el)return;
  var notes=S.selectedClient?S.notes.filter(function(n){return n.clientId===S.selectedClient}):[].concat(S.notes);
  notes.sort(function(a,b){return b.date.localeCompare(a.date)});
  if(!notes.length){el.innerHTML='<div class="empty">Aucune note.<br><br><button class="btn btn-primary" onclick="openNewNote()">+ Nouvelle note</button></div>';return}
  el.innerHTML='<div style="display:flex;flex-direction:column;gap:8px">'+notes.map(function(n){
    var c=S.clients.find(function(x){return x.id===n.clientId}),col=c?clientColor(c.id):'#888';
    var parts=n.date.split('-'),dl=parts[2]+' '+MONTHS[parseInt(parts[1])-1]+' '+parts[0];
    return'<div class="note-card" style="border-left:3px solid '+col+'" onclick="openNote('+n.id+')">'+
      '<div class="note-meta">'+
      '<div class="av" style="background:'+col+';width:20px;height:20px;font-size:8px;flex-shrink:0">'+(c?initials(c.nom):'?')+'</div>'+
      (c?'<span style="font-size:11px;font-weight:600">'+c.nom+'</span>':'')+
      '<span style="font-size:11px;color:#605e5c">'+dl+'</span>'+
      '<span class="badge" style="background:'+col+'20;color:'+col+'">Séance '+n.seance+'</span>'+
      '<span style="font-size:10px;color:#605e5c">'+n.dureeMin+' min</span></div>'+
      '<div class="note-preview">'+([n.contexte,n.ouOnEnEtait].filter(Boolean).join(' · ')||'Note sans aperçu.')+'</div></div>';
  }).join('')+'</div>';
}

function renderFiche(){
  var el=document.getElementById('view-fiche');if(!el)return;
  if(!S.selectedClient){el.innerHTML='<div class="empty">Sélectionnez un aidant dans la liste.</div>';return}
  var c=S.clients.find(function(x){return x.id===S.selectedClient});if(!c)return;
  var notes=S.notes.filter(function(n){return n.clientId===c.id});
  var totalMin=notes.reduce(function(s,n){return s+(parseInt(n.dureeMin)||0)},0);
  var col=clientColor(c.id);
  el.innerHTML='<div style="display:flex;flex-direction:column;gap:10px">'+
    '<div class="card" style="border-top:3px solid '+col+'">'+
      '<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">'+
        '<div class="av" style="background:'+col+';width:44px;height:44px;font-size:14px;flex-shrink:0">'+initials(c.nom)+'</div>'+
        '<div><div style="font-size:16px;font-weight:600">'+c.nom+'</div>'+
        '<div style="font-size:11px;color:#605e5c">'+(c.sexe||'—')+', '+(c.age||'—')+' ans · '+(c.municipalite||'—')+'</div></div>'+
        '<div style="margin-left:auto;display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end">'+
          '<span class="badge '+(c.membrePA?'badge-pa':'badge-non')+'">'+(c.membrePA?'Membre PA':'Non-PA')+'</span>'+
          (c.jasette?'<span class="badge" style="background:#dff6dd;color:#107c10">Jasette</span>':'')+
          (c.formationPA?'<span class="badge" style="background:#f0eeff;color:#4a3a9a">Formation PA</span>':'')+
          (c.zen?'<span class="badge" style="background:#e3f4f4;color:#005f64">PA Zen</span>':'')+
        '</div></div>'+
      '<div class="grid2" style="gap:6px">'+
        '<div class="field"><label>Téléphone</label><span>'+(c.tel||'—')+'</span></div>'+
        '<div class="field"><label>Anniversaire</label><span>'+(c.anniversaire||'—')+'</span></div>'+
        '<div class="field"><label>Adresse</label><span>'+(c.adresse||'—')+', '+(c.municipalite||'')+'</span></div>'+
        '<div class="field"><label>Période</label><span>'+(c.periode||'—')+'</span></div>'+
      '</div></div>'+
    '<div class="card" style="border-top:3px solid #e06c00">'+
      '<div class="card-title">❤ Personne aidée</div>'+
      '<div class="grid3">'+
        '<div class="field"><label>Nom</label><span>'+(c.nomAide||'—')+'</span></div>'+
        '<div class="field"><label>Lien</label><span>'+(c.lienAide||'—')+'</span></div>'+
        '<div class="field"><label>Âge / sexe</label><span>'+(c.ageAide||'—')+' ans ('+(c.sexeAide||'—')+')</span></div>'+
        '<div class="field"><label>Problème</label><span>'+(c.probleme||'—')+'</span></div>'+
        '<div class="field"><label>Vit seul(e)?</label><span>'+(c.seulAide?'Oui':'Non')+'</span></div>'+
        '<div class="field"><label>Lieu de vie</label><span>'+(c.lieuVie||'—')+'</span></div>'+
      '</div></div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'+
      '<div class="card" style="border-top:3px solid #107c10">'+
        '<div class="card-title">👥 Activités groupe</div>'+
        '<div class="grid2" style="gap:5px">'+
          '<div class="field"><label>Jasette</label><span>'+(c.jasette||0)+' h</span></div>'+
          '<div class="field"><label>Formation PA</label><span>'+(c.formationPA||0)+' h</span></div>'+
          '<div class="field"><label>PA Zen</label><span>'+(c.zen||0)+' h</span></div>'+
          '<div class="field"><label>Total groupes</label><span>'+(c.heuresGroupes||0)+' h</span></div>'+
        '</div></div>'+
      '<div class="card" style="border-top:3px solid #0078d4">'+
        '<div class="card-title">📋 Suivi individuel</div>'+
        '<div class="grid2" style="gap:5px">'+
          '<div class="field"><label>Séances</label><span>'+notes.length+'</span></div>'+
          '<div class="field"><label>Total minutes</label><span>'+totalMin+'</span></div>'+
          '<div class="field"><label>Mois rencontre</label><span>'+(c.moisRencontre||'—')+'</span></div>'+
          '<div class="field"><label>Dernière note</label><span>'+(notes.length?[].concat(notes).sort(function(a,b){return b.date.localeCompare(a.date)})[0].date:'—')+'</span></div>'+
        '</div></div>'+
    '</div></div>';
}

function renderStats(){
  var el=document.getElementById('view-stats');if(!el)return;
  var total=S.clients.length,pa=S.clients.filter(function(c){return c.membrePA}).length;
  var totalMin=S.notes.reduce(function(s,n){return s+(parseInt(n.dureeMin)||0)},0);
  var rows=S.clients.map(function(c){
    var n=S.notes.filter(function(x){return x.clientId===c.id});
    return{c:c,n:n.length,min:n.reduce(function(s,x){return s+(parseInt(x.dureeMin)||0)},0)};
  });
  el.innerHTML='<div style="display:flex;flex-direction:column;gap:12px">'+
    '<div class="stat-grid">'+
      '<div class="stat-card" style="border-top:3px solid #8764b8"><div class="stat-label">Aidants suivis</div><div class="stat-val">'+total+'</div></div>'+
      '<div class="stat-card" style="border-top:3px solid #0078d4"><div class="stat-label">Membres PA</div><div class="stat-val">'+pa+'</div></div>'+
      '<div class="stat-card" style="border-top:3px solid #107c10"><div class="stat-label">Non-membres</div><div class="stat-val">'+(total-pa)+'</div></div>'+
      '<div class="stat-card" style="border-top:3px solid #d83b01"><div class="stat-label">Minutes indiv.</div><div class="stat-val">'+totalMin+'</div></div>'+
    '</div>'+
    '<div class="card"><div class="card-title">📋 Par aidant</div>'+
      '<table class="tbl"><thead><tr><th>Aidant</th><th>Statut</th><th>Séances</th><th>Min.</th><th>H groupes</th><th>Municipalité</th></tr></thead>'+
      '<tbody>'+rows.map(function(r){
        return'<tr><td><div style="display:flex;align-items:center;gap:6px">'+
          '<div class="av" style="background:'+clientColor(r.c.id)+';width:20px;height:20px;font-size:8px">'+initials(r.c.nom)+'</div>'+r.c.nom+'</div></td>'+
          '<td><span class="badge '+(r.c.membrePA?'badge-pa':'badge-non')+'">'+(r.c.membrePA?'PA':'Non-PA')+'</span></td>'+
          '<td>'+r.n+'</td><td>'+r.min+'</td><td>'+(r.c.heuresGroupes||0)+'</td><td>'+(r.c.municipalite||'—')+'</td></tr>';
      }).join('')+'</tbody></table></div></div>';
}

// ═══════════════════════════════════════════
// NOTES
// ═══════════════════════════════════════════
function hintRow(key,label,cls,val){
  return'<div class="note-section">'+
    '<div class="section-header '+cls+'">'+
      '<div class="section-label">▸ '+label+'</div>'+
      '<div class="hint">'+HINTS[key].replace(/\n/g,'<br>')+'</div>'+
    '</div>'+
    '<div class="fg"><textarea id="f-'+key+'" placeholder="Vos notes…" style="min-height:58px">'+(val||'')+'</textarea></div>'+
  '</div>';
}

function clientOpts(sel){return S.clients.map(function(c){return'<option value="'+c.id+'"'+(c.id===sel?' selected':'')+'>'+c.nom+'</option>'}).join('')}
function openNote(id){var n=S.notes.find(function(x){return x.id===id});if(n)showNoteModal(n)}
function openNewNote(){showNoteModal(null,null)}
function openNewNoteDate(date){showNoteModal(null,date)}

function showNoteModal(note,prefDate){
  var isEdit=!!note;
  var date=note?note.date:(prefDate||new Date().toISOString().slice(0,10));
  var cid=note?note.clientId:(S.selectedClient||'');
  document.getElementById('mc').innerHTML='<div class="modal-wrap" id="mbg" onclick="closeMBg(event)">'+
  '<div class="modal">'+
    '<div class="modal-hdr"><span style="font-size:18px">📝</span>'+
      '<span class="modal-title">'+(isEdit?'Note de suivi':'Nouvelle note de suivi')+'</span>'+
      '<button class="btn btn-sm" onclick="closeModal()">✕</button></div>'+
    '<div class="row3">'+
      '<div class="fg"><label>Aidant</label><select id="f-cid">'+clientOpts(cid)+'</select></div>'+
      '<div class="fg"><label>Date</label><input type="date" id="f-date" value="'+date+'"></div>'+
      '<div class="fg"><label>Séance no.</label><input type="text" id="f-seance" value="'+(note?note.seance:'')+'" placeholder="ex: 5"></div>'+
    '</div>'+
    '<div class="row2">'+
      '<div class="fg"><label>Type</label><select id="f-type"><option value="individuelle"'+(!note||note.type==='individuelle'?' selected':'')+'>Individuelle</option><option value="telephone"'+(note&&note.type==='telephone'?' selected':'')+'>Téléphone</option></select></div>'+
      '<div class="fg"><label>Durée (minutes)</label><input type="number" id="f-dureeMin" value="'+(note?note.dureeMin:'')+'" placeholder="ex: 60"></div>'+
    '</div>'+
    '<div class="sec">Contenu de la note</div>'+
    hintRow('contexte','Contexte','s-contexte',note?note.contexte:'')+
    hintRow('ooe','Où on en était','s-ooe',note?note.ouOnEnEtait:'')+
    hintRow('objectif','Objectif','s-objectif',note?note.objectif:'')+
    hintRow('aos','AOS — ce qui a bougé','s-aos',note?note.aos:'')+
    hintRow('hypnose','Hypnose','s-hypnose',note?note.hypnose:'')+
    hintRow('suite','Pour la suite','s-suite',note?note.pourLaSuite:'')+
    '<div class="modal-foot">'+
      (isEdit?'<button class="btn btn-sm" onclick="deleteNote('+note.id+')" style="color:#a4262c">🗑 Supprimer</button>':'')+
      '<button class="btn btn-sm" onclick="closeModal()">Annuler</button>'+
      '<button class="btn btn-sm btn-primary" onclick="saveNote('+(isEdit?note.id:'null')+')">💾 Enregistrer</button>'+
    '</div></div></div>';
}

function saveNote(id){
  var cid=parseInt(document.getElementById('f-cid').value);
  if(!cid){alert('Veuillez sélectionner un aidant.');return}
  var note={id:id||S.nextId++,clientId:cid,
    date:document.getElementById('f-date').value,
    seance:document.getElementById('f-seance').value,
    type:document.getElementById('f-type').value,
    dureeMin:parseInt(document.getElementById('f-dureeMin').value)||0,
    contexte:document.getElementById('f-contexte').value,
    ouOnEnEtait:document.getElementById('f-ooe').value,
    objectif:document.getElementById('f-objectif').value,
    aos:document.getElementById('f-aos').value,
    hypnose:document.getElementById('f-hypnose').value,
    pourLaSuite:document.getElementById('f-suite').value,
  };
  if(id){var i=S.notes.findIndex(function(n){return n.id===id});if(i>=0)S.notes[i]=note}
  else S.notes.push(note);
  save();closeModal();render();
}

function deleteNote(id){if(!confirm('Supprimer cette note?'))return;S.notes=S.notes.filter(function(n){return n.id!==id});save();closeModal();render()}

function openAddClient(){
  document.getElementById('mc').innerHTML='<div class="modal-wrap" id="mbg" onclick="closeMBg(event)">'+
  '<div class="modal" style="max-width:420px">'+
    '<div class="modal-hdr"><span class="modal-title">Ajouter un aidant manuellement</span><button class="btn btn-sm" onclick="closeModal()">✕</button></div>'+
    '<div style="font-size:12px;color:#605e5c;padding:2px 0 8px">Pour les aidants de votre liste Excel, utilisez "Actualiser liste".</div>'+
    '<div class="row2">'+
      '<div class="fg"><label>Nom, Prénom</label><input type="text" id="c-nom" placeholder="Tremblay, Marie"></div>'+
      '<div class="fg"><label>Téléphone</label><input type="text" id="c-tel" placeholder="418-555-0000"></div>'+
    '</div>'+
    '<div class="modal-foot">'+
      '<button class="btn btn-sm" onclick="closeModal()">Annuler</button>'+
      '<button class="btn btn-sm btn-primary" onclick="saveManualClient()">Ajouter</button>'+
    '</div></div></div>';
}

function saveManualClient(){
  var nom=document.getElementById('c-nom').value.trim();
  if(!nom){alert('Veuillez entrer un nom.');return}
  var c={id:S.nextClientId++,nom:nom,tel:document.getElementById('c-tel').value,membrePA:false,sexe:'',age:'',anniversaire:'',adresse:'',municipalite:'',periode:'',jasette:0,formationPA:0,zen:0,heuresGroupes:0,lienAide:'',nomAide:'',sexeAide:'',ageAide:'',probleme:'',seulAide:false,lieuVie:'',moisRencontre:''};
  S.clients.push(c);S.selectedClient=c.id;save();closeModal();render();
}

function closeModal(){document.getElementById('mc').innerHTML=''}
function closeMBg(e){if(e.target.id==='mbg')closeModal()}
</script>
</body>
